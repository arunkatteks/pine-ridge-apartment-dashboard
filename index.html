<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pine Ridge Apartment Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  margin: 10px;
  background: #f5f7fa;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

select, button {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

.unpaid {
  color: red;
  font-weight: bold;
}

.paid {
  color: green;
  font-weight: bold;
}

pre {
  background: #eee;
  padding: 10px;
}
</style>
</head>

<body>

<h1>Pine Ridge Apartment Dashboard</h1>

<div class="card">
  <label>Select Month:</label>
  <select id="monthSelect"></select>
</div>

<div class="card">
  <p>Expenses: ₹<span id="expenses"></span></p>
  <p>Collected: ₹<span id="collected"></span></p>
  <p>Pending: ₹<span id="pending"></span></p>
</div>

<div class="card">
  <canvas id="expenseChart"></canvas>
</div>

<div class="card">
  <canvas id="collectionChart"></canvas>
</div>

<div class="card">
  <button onclick="copyDefaulters()">Copy Defaulters</button>
  <pre id="defaultersText"></pre>
</div>

<div class="card">
  <h3>Apartment Tracker</h3>

  <table>
    <thead>
      <tr>
        <th>Flat</th>
        <th>Owner</th>
        <th>Due</th>
        <th>Paid</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let workbookData = {};

fetch("data.json")
  .then(res => res.json())
  .then(data => {
    workbookData = data;
    populateMonths();
  })
  .catch(err => {
    document.body.innerHTML =
      "<h2 style='color:red'>Error loading data.json</h2><pre>" + err + "</pre>";
  });

function populateMonths() {
  const months = [];

  Object.keys(workbookData).forEach(sheet => {
    if (sheet.toLowerCase().includes("expenses")) {
      months.push(sheet.replace(/expenses/i, "").trim());
    }
  });

  const select = document.getElementById("monthSelect");
  select.innerHTML = "";

  months.forEach(month => {
    const opt = document.createElement("option");
    opt.value = month;
    opt.textContent = month;
    select.appendChild(opt);
  });

  if (months.length > 0) {
    loadMonth(months[0]);
  }

  select.onchange = () => loadMonth(select.value);
}

function loadMonth(month) {

  const expenseKey = Object.keys(workbookData)
    .find(k => k.toLowerCase() === ("expenses " + month).toLowerCase());

  const maintenanceKey = Object.keys(workbookData)
    .find(k => k.toLowerCase() === ("maintenance " + month).toLowerCase());

  const expenses = workbookData[expenseKey] || [];
  const collection = workbookData[maintenanceKey] || [];

  renderSummary(expenses, collection);
  renderCharts(expenses, collection);
  renderTable(collection);
  renderDefaulters(collection, month);
}

function renderSummary(exp, col) {

  document.getElementById("expenses").textContent =
    exp.reduce((s,x)=>s+(x.Amount||0),0);

  document.getElementById("collected").textContent =
    col.reduce((s,x)=>s+(x["Amount Paid"]||0),0);

  document.getElementById("pending").textContent =
    col.reduce((s,x)=>s+((x["Amount Due"]||0)-(x["Amount Paid"]||0)),0);
}

function renderCharts(exp, col) {

  let cat = {};

  exp.forEach(e => {
    cat[e.Category] = (cat[e.Category] || 0) + e.Amount;
  });

  if(window.expenseChartObj)
    window.expenseChartObj.destroy();

  window.expenseChartObj = new Chart(
    document.getElementById("expenseChart"),
    {
      type:'pie',
      data:{
        labels:Object.keys(cat),
        datasets:[{
          data:Object.values(cat)
        }]
      }
    }
  );

  let paid=0, unpaid=0;

  col.forEach(c=>{
    ((c["Amount Paid"]||0)>=c["Amount Due"])
      ? paid++
      : unpaid++;
  });

  if(window.collectionChartObj)
    window.collectionChartObj.destroy();

  window.collectionChartObj = new Chart(
    document.getElementById("collectionChart"),
    {
      type:'bar',
      data:{
        labels:["Paid","Unpaid"],
        datasets:[{
          data:[paid, unpaid]
        }]
      }
    }
  );
}

function renderTable(col) {

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  col.forEach(c => {

    let unpaid =
      (c["Amount Paid"]||0) <
      (c["Amount Due"]||0);

    tbody.innerHTML += `
      <tr>
        <td>${c.Flat || ""}</td>
        <td>${c.Owner || ""}</td>
        <td>₹${c["Amount Due"] || 0}</td>
        <td>₹${c["Amount Paid"] || 0}</td>
        <td class="${unpaid ? 'unpaid' : 'paid'}">
          ${unpaid ? 'Unpaid' : 'Paid'}
        </td>
      </tr>
    `;
  });
}

function renderDefaulters(col, month) {

  let txt =
    "Hello, below are defaulters for " +
    month +
    " maintenance:\n\n";

  col
    .filter(c =>
      (c["Amount Paid"]||0) <
      (c["Amount Due"]||0)
    )
    .forEach(d => {
      txt += d.Flat + "\n";
    });

  document.getElementById("defaultersText").textContent = txt;
}

function copyDefaulters() {

  navigator.clipboard.writeText(
    document.getElementById("defaultersText").textContent
  );

  alert("Copied!");
}
</script>

</body>
</html>
