<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pine Ridge Apartment Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; margin: 10px; background: #f5f7fa; }
h1 { text-align: center; }

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

select, button {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
  font-size: 16px;
}

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 8px; border-bottom: 1px solid #ddd; }

.paid { color: green; font-weight: bold; }
.unpaid { color: red; font-weight: bold; background: #ffe6e6; }

button {
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
}

pre {
  white-space: pre-wrap;
  background: #f0f0f0;
  padding: 10px;
  border-radius: 6px;
}

.error {
  color: red;
  padding: 20px;
  font-weight: bold;
}

@media (max-width: 600px) {
  table { font-size: 12px; }
}
</style>
</head>

<body>

<h1>Pine Ridge Apartment Dashboard</h1>

<div class="card">
  <label>Select Month:</label>
  <select id="monthSelect"></select>
</div>

<div class="card">
  <h3>Summary</h3>
  <p>Expenses: ₹<span id="expenses"></span></p>
  <p>Collected: ₹<span id="collected"></span></p>
  <p>Pending: ₹<span id="pending"></span></p>
</div>

<div class="card">
  <h3>Expense Breakdown</h3>
  <canvas id="expenseChart"></canvas>
</div>

<div class="card">
  <h3>Collection Status</h3>
  <canvas id="collectionChart"></canvas>
</div>

<div class="card">
  <h3>Defaulters</h3>
  <button onclick="copyDefaulters()">Copy WhatsApp Message</button>
  <pre id="defaultersText"></pre>
</div>

<div class="card">
  <h3>Apartment Tracker</h3>
  <table>
    <thead>
      <tr>
        <th>Flat</th>
        <th>Owner</th>
        <th>Due</th>
        <th>Paid</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const EXCEL_URL = "https://api.onedrive.com/v1.0/shares/u!aHR0cHM6Ly8xZHJ2Lm1zL3gvYy9GQjg0QzFBOEQ5MUUwNkNDL0lRQzFFZUdBU2xtQVJvTGd5YThJSnRTR0FUNWc3QWVkZzNpdkdKMnBtU1Baa1lJ/root/content";

let workbookData = {};

fetch(EXCEL_URL)
  .then(res => {
    if (!res.ok) throw new Error("Failed to fetch Excel file");
    return res.arrayBuffer();
  })
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });

    console.log("Detected sheets:", workbook.SheetNames);

    workbook.SheetNames.forEach(sheet => {
      workbookData[sheet.trim()] =
        XLSX.utils.sheet_to_json(workbook.Sheets[sheet]);
    });

    populateMonths();
  })
  .catch(err => {
    document.body.innerHTML = `<h2 style="color:red">${err}</h2>`;
  });

function populateMonths() {
  const months = new Set();

  Object.keys(workbookData).forEach(sheet => {
    if (sheet.toLowerCase().includes("expenses")) {
      const month = sheet.replace(/expenses/i, "").trim();
      months.add(month);
    }
  });

  console.log("Detected months:", [...months]);

  const select = document.getElementById("monthSelect");
  select.innerHTML = "";

  months.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    select.appendChild(opt);
  });

  if (months.size > 0) {
    select.onchange = () => loadMonth(select.value);
    loadMonth(select.value);
  }
}

function loadMonth(month) {
  const expenseKey = Object.keys(workbookData).find(
    k => k.toLowerCase() === `expenses ${month}`.toLowerCase()
  );

  const maintenanceKey = Object.keys(workbookData).find(
    k => k.toLowerCase() === `maintenance ${month}`.toLowerCase()
  );

  const expenses = workbookData[expenseKey] || [];
  const collection = workbookData[maintenanceKey] || [];

  renderSummary(expenses, collection);
  renderCharts(expenses, collection);
  renderTable(collection);
  generateDefaulters(collection, month);
}

function renderSummary(exp, col) {
  document.getElementById("expenses").textContent =
    exp.reduce((s,x)=>s+(x.Amount||0),0);

  document.getElementById("collected").textContent =
    col.reduce((s,x)=>s+(x["Amount Paid"]||0),0);

  document.getElementById("pending").textContent =
    col.reduce((s,x)=>s+((x["Amount Due"]||0)-(x["Amount Paid"]||0)),0);
}

function renderCharts(exp, col) {
  let cat = {};
  exp.forEach(e => {
    cat[e.Category] = (cat[e.Category]||0)+e.Amount;
  });

  if(window.expenseChart) window.expenseChart.destroy();
  window.expenseChart = new Chart(expenseChart, {
    type:'pie',
    data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
  });

  let paid=0, unpaid=0;
  col.forEach(c=>{
    ((c["Amount Paid"]||0)>=c["Amount Due"]) ? paid++ : unpaid++;
  });

  if(window.collectionChart) window.collectionChart.destroy();
  window.collectionChart = new Chart(collectionChart, {
    type:'bar',
    data:{labels:["Paid","Unpaid"],datasets:[{data:[paid,unpaid]}]}
  });
}

function renderTable(col) {
  tableBody.innerHTML = "";

  col.forEach(c=>{
    let unpaid = (c["Amount Paid"]||0)<(c["Amount Due"]||0);

    tableBody.innerHTML += `
      <tr>
        <td>${c.Flat||""}</td>
        <td>${c.Owner||""}</td>
        <td>₹${c["Amount Due"]||0}</td>
        <td>₹${c["Amount Paid"]||0}</td>
        <td class="${unpaid?'unpaid':'paid'}">${unpaid?'Unpaid':'Paid'}</td>
      </tr>
    `;
  });
}

function generateDefaulters(col, month){
  let text = `Hello, below are defaulters for ${month} maintenance:\n\n`;

  col.filter(c=>(c["Amount Paid"]||0)<(c["Amount Due"]||0))
     .forEach(d=> text += `${d.Flat}\n`);

  defaultersText.textContent = text;
}

function copyDefaulters() {
  navigator.clipboard.writeText(defaultersText.textContent);
  alert("Copied!");
}
</script>

</body>
</html>
