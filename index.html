<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Ridge Apartment Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 10px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
}

button:hover {
  opacity: 0.9;
}

canvas {
  max-width: 100%;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

.paid {
  color: green;
  font-weight: bold;
}

.unpaid {
  color: red;
  font-weight: bold;
}

pre {
  white-space: pre-wrap;
  background: #f0f0f0;
  padding: 10px;
  border-radius: 5px;
}

.error {
  color: red;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>Pine Ridge Apartment Dashboard</h1>

<div class="card">
  <label>Select Month:</label>
  <select id="monthSelect"></select>
</div>

<div class="card">
  <h3>Summary</h3>
  <p>Total Expenses: ₹<span id="expenses">0</span></p>
  <p>Total Collected: ₹<span id="collected">0</span></p>
  <p>Total Pending: ₹<span id="pending">0</span></p>
</div>

<div class="card">
  <h3>Expense Breakdown</h3>
  <canvas id="expenseChart"></canvas>
</div>

<div class="card">
  <h3>Collection Status</h3>
  <canvas id="collectionChart"></canvas>
</div>

<div class="card">
  <h3>Defaulters</h3>
  <button onclick="copyDefaulters()">Copy WhatsApp Message</button>
  <pre id="defaultersText"></pre>
</div>

<div class="card table-container">
  <h3>Apartment Tracker</h3>

  <table>
    <thead>
      <tr>
        <th>Flat</th>
        <th>Owner</th>
        <th>Due</th>
        <th>Paid</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let workbookData = {};
let expenseChartObj = null;
let collectionChartObj = null;

fetch('data.json')
  .then(response => {
    if (!response.ok) {
      throw new Error('Could not load data.json');
    }
    return response.json();
  })
  .then(data => {
    workbookData = data;
    populateMonths();
  })
  .catch(error => {
    document.body.innerHTML = `
      <div class="card error">
        Error loading dashboard data.<br><br>
        ${error}
      </div>
    `;
  });

function populateMonths() {
  const monthSelect = document.getElementById('monthSelect');

  if (!monthSelect) {
    console.error('monthSelect element missing');
    return;
  }

  const months = [];

  Object.keys(workbookData).forEach(sheet => {
    if (sheet.toLowerCase().includes('expenses')) {
      months.push(sheet.replace(/expenses/i, '').trim());
    }
  });

  monthSelect.innerHTML = '';

  months.forEach(month => {
    const option = document.createElement('option');
    option.value = month;
    option.textContent = month;
    monthSelect.appendChild(option);
  });

  if (months.length > 0) {
    loadMonth(months[0]);
  }

  monthSelect.addEventListener('change', function() {
    loadMonth(this.value);
  });
}

function loadMonth(month) {
  const expenseKey = Object.keys(workbookData)
    .find(key => key.toLowerCase() === ('expenses ' + month).toLowerCase());

  const maintenanceKey = Object.keys(workbookData)
    .find(key => key.toLowerCase() === ('maintenance ' + month).toLowerCase());

  const expenses = workbookData[expenseKey] || [];
  const collection = workbookData[maintenanceKey] || [];

  renderSummary(expenses, collection);
  renderCharts(expenses, collection);
  renderTable(collection);
  renderDefaulters(collection, month);
}

function renderSummary(expenses, collection) {
  document.getElementById('expenses').textContent =
    expenses.reduce((sum, item) => sum + (item.Amount || 0), 0);

  document.getElementById('collected').textContent =
    collection.reduce((sum, item) => sum + (item['Amount Paid'] || 0), 0);

  document.getElementById('pending').textContent =
    collection.reduce((sum, item) => {
      return sum + ((item['Amount Due'] || 0) - (item['Amount Paid'] || 0));
    }, 0);
}

function renderCharts(expenses, collection) {
  const categoryTotals = {};

  expenses.forEach(item => {
    categoryTotals[item.Category] =
      (categoryTotals[item.Category] || 0) + (item.Amount || 0);
  });

  if (expenseChartObj) {
    expenseChartObj.destroy();
  }

  expenseChartObj = new Chart(
    document.getElementById('expenseChart'),
    {
      type: 'pie',
      data: {
        labels: Object.keys(categoryTotals),
        datasets: [{
          data: Object.values(categoryTotals)
        }]
      }
    }
  );

  let paid = 0;
  let unpaid = 0;

  collection.forEach(item => {
    if ((item['Amount Paid'] || 0) >= (item['Amount Due'] || 0)) {
      paid++;
    } else {
      unpaid++;
    }
  });

  if (collectionChartObj) {
    collectionChartObj.destroy();
  }

  collectionChartObj = new Chart(
    document.getElementById('collectionChart'),
    {
      type: 'bar',
      data: {
        labels: ['Paid', 'Unpaid'],
        datasets: [{
          data: [paid, unpaid]
        }]
      }
    }
  );
}

function renderTable(collection) {
  const tableBody = document.getElementById('tableBody');

  if (!tableBody) {
    console.error('tableBody element missing');
    return;
  }

  tableBody.innerHTML = '';

  collection.forEach(item => {
    const unpaid =
      (item['Amount Paid'] || 0) < (item['Amount Due'] || 0);

    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${item.Flat || ''}</td>
      <td>${item.Owner || ''}</td>
      <td>₹${item['Amount Due'] || 0}</td>
      <td>₹${item['Amount Paid'] || 0}</td>
      <td class="${unpaid ? 'unpaid' : 'paid'}">
        ${unpaid ? 'Unpaid' : 'Paid'}
      </td>
    `;

    tableBody.appendChild(row);
  });
}

function renderDefaulters(collection, month) {
  const defaultersText = document.getElementById('defaultersText');

  let text =
    'Hello, below are defaulters for ' +
    month +
    ' maintenance:\n\n';

  collection
    .filter(item => {
      return (item['Amount Paid'] || 0) < (item['Amount Due'] || 0);
    })
    .forEach(item => {
      text += (item.Flat || '') + '\n';
    });

  defaultersText.textContent = text;
}

function copyDefaulters() {
  const text = document.getElementById('defaultersText').textContent;

  navigator.clipboard.writeText(text)
    .then(() => {
      alert('Copied for WhatsApp');
    });
}
</script>

</body>
</html>
