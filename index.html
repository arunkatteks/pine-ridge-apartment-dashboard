<script>
/*Updated file*/
document.addEventListener("DOMContentLoaded", function () {

let workbookData = {};
let expenseChartObj = null;
let collectionChartObj = null;

fetch("data.json")
  .then(response => {
    if (!response.ok) {
      throw new Error("Could not load data.json");
    }
    return response.json();
  })
  .then(data => {
    workbookData = data;
    populateMonths();
  })
  .catch(error => {

    const body = document.querySelector("body");

    if (body) {
      body.innerHTML = `
        <div style="padding:20px;color:red;font-weight:bold;">
          Error loading data.json<br><br>
          ${error}
        </div>
      `;
    }

    console.error(error);
  });

function populateMonths() {

  const monthSelect = document.getElementById("monthSelect");

  if (!monthSelect) {
    console.error("monthSelect missing");
    return;
  }

  const months = [];

  Object.keys(workbookData).forEach(sheet => {

    if (sheet.toLowerCase().includes("expenses")) {

      months.push(
        sheet.replace(/expenses/i, "").trim()
      );
    }
  });

  monthSelect.innerHTML = "";

  months.forEach(month => {

    const option = document.createElement("option");

    option.value = month;
    option.textContent = month;

    monthSelect.appendChild(option);
  });

  if (months.length > 0) {
    loadMonth(months[0]);
  }

  monthSelect.addEventListener("change", function () {
    loadMonth(this.value);
  });
}

function loadMonth(month) {

  const expenseKey = Object.keys(workbookData)
    .find(key =>
      key.toLowerCase() ===
      ("expenses " + month).toLowerCase()
    );

  const maintenanceKey = Object.keys(workbookData)
    .find(key =>
      key.toLowerCase() ===
      ("maintenance " + month).toLowerCase()
    );

  const expenses = workbookData[expenseKey] || [];
  const collection = workbookData[maintenanceKey] || [];

  renderSummary(expenses, collection);
  renderCharts(expenses, collection);
  renderTable(collection);
  renderDefaulters(collection, month);
}

function renderSummary(expenses, collection) {

  document.getElementById("expenses").textContent =
    expenses.reduce((sum, item) =>
      sum + (item.Amount || 0), 0);

  document.getElementById("collected").textContent =
    collection.reduce((sum, item) =>
      sum + (item["Amount Paid"] || 0), 0);

  document.getElementById("pending").textContent =
    collection.reduce((sum, item) =>
      sum + (
        (item["Amount Due"] || 0) -
        (item["Amount Paid"] || 0)
      ), 0);
}

function renderCharts(expenses, collection) {

  const categories = {};

  expenses.forEach(item => {

    categories[item.Category] =
      (categories[item.Category] || 0) +
      (item.Amount || 0);
  });

  if (expenseChartObj) {
    expenseChartObj.destroy();
  }

  expenseChartObj = new Chart(
    document.getElementById("expenseChart"),
    {
      type: "pie",
      data: {
        labels: Object.keys(categories),
        datasets: [{
          data: Object.values(categories)
        }]
      }
    }
  );

  let paid = 0;
  let unpaid = 0;

  collection.forEach(item => {

    if (
      (item["Amount Paid"] || 0) >=
      (item["Amount Due"] || 0)
    ) {
      paid++;
    } else {
      unpaid++;
    }
  });

  if (collectionChartObj) {
    collectionChartObj.destroy();
  }

  collectionChartObj = new Chart(
    document.getElementById("collectionChart"),
    {
      type: "bar",
      data: {
        labels: ["Paid", "Unpaid"],
        datasets: [{
          data: [paid, unpaid]
        }]
      }
    }
  );
}

function renderTable(collection) {

  const tableBody =
    document.getElementById("tableBody");

  if (!tableBody) {
    console.error("tableBody missing");
    return;
  }

  tableBody.innerHTML = "";

  collection.forEach(item => {

    const unpaid =
      (item["Amount Paid"] || 0) <
      (item["Amount Due"] || 0);

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.Flat || ""}</td>
      <td>${item.Owner || ""}</td>
      <td>₹${item["Amount Due"] || 0}</td>
      <td>₹${item["Amount Paid"] || 0}</td>
      <td class="${unpaid ? "unpaid" : "paid"}">
        ${unpaid ? "Unpaid" : "Paid"}
      </td>
    `;

    tableBody.appendChild(row);
  });
}

function renderDefaulters(collection, month) {

  const defaultersText =
    document.getElementById("defaultersText");

  let text =
    "Hello, below are defaulters for " +
    month +
    " maintenance:\n\n";

  collection
    .filter(item =>
      (item["Amount Paid"] || 0) <
      (item["Amount Due"] || 0)
    )
    .forEach(item => {
      text += (item.Flat || "") + "\n";
    });

  if (defaultersText) {
    defaultersText.textContent = text;
  }
}

window.copyDefaulters = function () {

  const text =
    document.getElementById("defaultersText")
      .textContent;

  navigator.clipboard.writeText(text);

  alert("Copied!");
};

});
</script>
